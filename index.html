function mkMv(e){return{name:e.mv.name,power:e.mv.pw,type:e.mv.type,pp:e.mv.mpp,maxPp:e.mv.mpp};}
function buildMoves(id,lv){return(LEARNSET[baseIdOf(id)]||[]).filter(e=>e.lv<=lv).slice(-4).map(mkMv);}
function learnAtLv(id,lv){return(LEARNSET[baseIdOf(id)]||[]).filter(e=>e.lv===lv).map(mkMv);}
function restoreAllPP(c){return{...c,moves:c.moves.map(m=>({...m,pp:m.maxPp}))};}
function expNeeded(lv){return Math.floor(lv*lv*0.6+lv*12);}
function calcDmg(atk,def,power){return Math.max(1,Math.floor(power*(atk/Math.max(def,1))*0.5*(0.85+Math.random()*0.15)));}

function gainExp(c,amount){
  let cr={...c,exp:(c.exp||0)+amount};
  const levelUps=[],newMovesToLearn=[],evolutions=[];
  while(cr.level<MAX_LEVEL){
    if(cr.exp<expNeeded(cr.level+1))break;
    cr.exp-=expNeeded(cr.level+1);cr.level++;
    cr={...cr,maxHp:Math.floor(cr.maxHp*1.06),atk:Math.floor(cr.atk*1.05),def:Math.floor(cr.def*1.04),spd:Math.floor(cr.spd*1.04)};
    cr.hp=Math.min(cr.hp+8,cr.maxHp);
    cr={...cr,moves:cr.moves.map(m=>({...m,pp:m.maxPp}))};
    levelUps.push(cr.level);
    learnAtLv(cr.id,cr.level).forEach(mv=>newMovesToLearn.push(mv));
    const info=ID2EVO[cr.id];
    if(info&&info.evoAt&&cr.level>=info.evoAt){
      const chain=EVO[info.chain],next=chain[info.idx+1];
      if(next){const oldName=cr.name;cr={...cr,id:next.id,name:next.name,spr:next.spr,maxHp:Math.floor(cr.maxHp*1.15),atk:Math.floor(cr.atk*1.12),def:Math.floor(cr.def*1.10),spd:Math.floor(cr.spd*1.10),moves:buildMoves(next.id,cr.level)};cr.hp=Math.min(cr.hp+20,cr.maxHp);evolutions.push({from:oldName,to:cr.name});}
    }
  }
  return{creature:cr,levelUps,newMovesToLearn,evolutions};
}

// アイテム使用（uses カウント対応）
function useItemOn(it,party){
  if(it.type==="pp"){
    const ppAmt=it.name.includes("大")?99:15;
    const np=party.map((c,i)=>i===0?{...c,moves:(c.moves||[]).map(m=>({...m,pp:Math.min(m.maxPp,m.pp+ppAmt)}))}:c);
    return{party:np,msg:`${party[0]?.name||"仲間"}のPPが回復した！`};
  }
  if(it.hp>0){
    const lead=party[0];
    if(!lead||!lead.hp)return{party,msg:"仲間がいない。"};
    if(lead.hp>=lead.maxHp)return{party,msg:"HPは満タンだ。"};
    const np=party.map((c,i)=>i===0?{...c,hp:Math.min(c.maxHp,c.hp+it.hp)}:c);
    return{party:np,msg:`${party[0].name}のHPが${it.hp}回復した！`};
  }
  return{party,msg:"何も起きなかった。"};
}

function drawSpr(ctx,key,fi,x,y,sc=2){const s=SPRITES[key];if(!s)return;const f=s.frames[fi%s.frames.length];for(let py=0;py<s.h;py++)for(let px2=0;px2<s.w;px2++){const col=PAL[f[py*s.w+px2]];if(!col||col==="transparent")continue;ctx.fillStyle=col;ctx.fillRect(x+px2*sc,y+py*sc,sc,sc);}}

const TA={[WALL]:"#0a0a1a",[GRASS]:"#1a3a1a",[TALL]:"#0f3f0f",[STONE]:"#333",[DOOR]:"#7a5500",[HEAL]:"#003333"};

function CreatureCanvas({spr,color,size=40,scale}){const ref=useRef(null);const t=useRef(0);const sc=scale||(spr&&SPRITES[spr]?.w<=12?Math.floor(size/12):Math.floor(size/16))||2;useEffect(()=>{const id=setInterval(()=>{t.current++;const c=ref.current;if(!c)return;const ctx=c.getContext("2d");ctx.imageSmoothingEnabled=false;ctx.fillStyle="#0a0508";ctx.fillRect(0,0,size,size);if(spr&&SPRITES[spr]){const s=SPRITES[spr];const fw=s.w*sc,fh=s.h*sc;drawSpr(ctx,spr,Math.floor(t.current/20)%s.frames.length,Math.floor((size-fw)/2),Math.max(0,Math.floor((size-fh)/2)),sc);}else if(color){ctx.fillStyle=color;ctx.beginPath();ctx.arc(size/2,size/2,size*0.35,0,Math.PI*2);ctx.fill();}},150);return()=>clearInterval(id);},[spr,color,size,sc]);return <canvas ref={ref} width={size} height={size} style={{imageRendering:"pixelated",flexShrink:0}}/>;}

    ctx.fillText("── 目が覚めた ──",200,270);
    ctx.font="12px serif";ctx.fillStyle=`rgba(190,170,140,${a*.9})`;
    ctx.fillText("ここは…どこだ。暗い。冷たい。",200,292);
    ctx.fillText("帰らなければ。…どこへ？",200,312);
  },50);return()=>clearInterval(id);},[]);
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",background:"#050305",minHeight:"100vh",fontFamily:"serif"}}>
    <canvas ref={ref} width={400} height={360} style={{imageRendering:"pixelated",width:"100%",maxWidth:400}}/>
    <div style={{display:"flex",flexDirection:"column",gap:12,width:"80%",maxWidth:280,padding:"16px 0 40px"}}>
      <button onClick={onNew} style={{background:"#3d0000",border:"2px solid #cc3300",color:"#ffffff",fontSize:16,padding:"14px 0",cursor:"pointer",fontFamily:"serif",letterSpacing:2}}>はじめる</button>
      {hasSave&&<button onClick={onContinue} style={{background:"#001a1a",border:"2px solid #00aaaa",color:"#aaffff",fontSize:14,padding:"12px 0",cursor:"pointer",fontFamily:"serif",letterSpacing:2}}>つづきから</button>}
    </div>
  </div>);
}

function SelectScreen({onSelect}){

function MapScreen({gs,setGs,onBattle,onMsg}){
  const ref=useRef(null);const gsRef=useRef(gs);gsRef.current=gs;
  const af=useRef(0);const wfi=useRef(0);const busy=useRef(false);
  const [fading,setFading]=useState(false);
  const ar=WORLD[gs.area]||WORLD[0];
  const WALK_SEQ=[0,1,0,2];
  const exitSet=new Set((ar.exits||[]).filter(e=>e.toArea!==gs.area).map(e=>`${e.x},${e.y}`));

  useEffect(()=>{
    let raf;
    const render=()=>{
      af.current++;
      const cv=ref.current;if(!cv){raf=requestAnimationFrame(render);return;}
      const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=false;
      const g=gsRef.current;const a=WORLD[g.area]||WORLD[0];
      const cx=Math.max(0,Math.min(MAP_W-VIEW_W,g.pos.x-Math.floor(VIEW_W/2)));
      const cy=Math.max(0,Math.min(MAP_H-VIEW_H,g.pos.y-Math.floor(VIEW_H/2)));
      ctx.fillStyle=a.bg;ctx.fillRect(0,0,VIEW_W*TILE,VIEW_H*TILE);
      const pulse=Math.sin(af.current*0.08)*0.5+0.5;
      for(let ty=0;ty<VIEW_H;ty++)for(let tx=0;tx<VIEW_W;tx++){const mx=cx+tx,my=cy+ty;if(mx>=0&&mx<MAP_W&&my>=0&&my<MAP_H)drawTile(ctx,a.map[my][mx],tx*TILE,ty*TILE,exitSet.has(`${mx},${my}`),pulse);}
      a.items&&a.items.forEach(fi=>{if((g.pickedItems||[]).includes(fi.id))return;const sx=(fi.pos.x-cx)*TILE,sy=(fi.pos.y-cy)*TILE;if(sx<0||sy<0||sx>=VIEW_W*TILE||sy>=VIEW_H*TILE)return;if(Math.sin(af.current*.12)>0){ctx.fillStyle="#ffcc00";ctx.font="bold 18px serif";ctx.textAlign="center";ctx.fillText("✦",sx+TILE/2,sy+TILE*.75);}});
      a.npcs&&a.npcs.forEach(n=>{if(n.id==="granny"&&g.grannyJoined)return;const sx=(n.pos.x-cx)*TILE,sy=(n.pos.y-cy)*TILE;if(SPRITES[n.spr])drawSpr(ctx,n.spr,0,sx,sy-12,2);});
      if(a.boss&&!(g.defeatedBosses||[]).includes(a.boss.data.id)){const bx=(a.boss.pos.x-cx)*TILE,by=(a.boss.pos.y-cy)*TILE;if(SPRITES[a.boss.spr])drawSpr(ctx,a.boss.spr,0,bx,by-12,2);}
      drawSpr(ctx,"grandpa",WALK_SEQ[wfi.current],(g.pos.x-cx)*TILE,(g.pos.y-cy)*TILE-12,2);
      raf=requestAnimationFrame(render);
    };
    raf=requestAnimationFrame(render);return()=>cancelAnimationFrame(raf);
  },[exitSet]);

  const move=useCallback((dx,dy)=>{
    if(busy.current)return;
    const g=gsRef.current;const a=WORLD[g.area]||WORLD[0];
    const nx=g.pos.x+dx,ny=g.pos.y+dy;
    if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H)return;
    if(a.map[ny][nx]===WALL||a.map[ny][nx]===STONE)return;
    wfi.current=(wfi.current+1)%4;
    // 前進扉（次のエリアへ）- ボス未撃破ならブロック
    const exFwd=a.exits&&a.exits.find(e=>e.x===nx&&e.y===ny&&e.toArea>g.area);
    if(exFwd){
      const bossDefeated=!a.boss||(g.defeatedBosses||[]).includes(a.boss.data.id);
      if(!bossDefeated){onMsg({type:"talk",speaker:"",text:"…まだここを通れない気がする。",cb:()=>{}});return;}
      busy.current=true;setFading(true);setTimeout(()=>{setGs(p=>{const n={...p,pos:{x:exFwd.sx,y:exFwd.sy},area:exFwd.toArea};save(n);return n;});setTimeout(()=>{setFading(false);busy.current=false;},200);},350);return;
    }
    // 後退扉（前のエリアへ）- 常に通れる
    const exBack=a.exits&&a.exits.find(e=>e.x===nx&&e.y===ny&&e.toArea<g.area);
    if(exBack){busy.current=true;setFading(true);setTimeout(()=>{setGs(p=>{const n={...p,pos:{x:exBack.sx,y:exBack.sy},area:exBack.toArea};save(n);return n;});setTimeout(()=>{setFading(false);busy.current=false;},200);},350);return;}
    const fi=a.items&&a.items.find(f=>f.pos.x===nx&&f.pos.y===ny&&!(g.pickedItems||[]).includes(f.id));
    if(fi){busy.current=true;const itDef=ITEMS[fi.key];setGs(p=>{const n={...p,pos:{x:nx,y:ny},pickedItems:[...(p.pickedItems||[]),fi.id]};if(itDef.type==="heal"||itDef.type==="pp")n.inventory=[...(p.inventory||[]),{...itDef,_uid:fi.id}];if(itDef.type==="memory")n.memoryItems=[...(p.memoryItems||[]),{...itDef,_uid:fi.id}];save(n);return n;});onMsg({type:"item",item:itDef,cb:()=>{busy.current=false;}});return;}
    const npc=a.npcs&&a.npcs.find(n=>n.pos.x===nx&&n.pos.y===ny);
    if(npc&&!(g.grannyJoined)){busy.current=true;setGs(p=>{const idx=p.grannyTalkCount||0;const text=npc.talks[Math.min(idx,npc.talks.length-1)];const nc=Math.min(idx+1,npc.talks.length-1);const justJoin=nc>=29&&!p.grannyJoined;let n={...p,pos:{x:nx,y:ny},grannyTalkCount:nc};if(justJoin){n.grannyJoined=true;if(n.party.length<MAX_PARTY)n.party=[...n.party,{...GRANNY_C}];}const sc=[...(n.seenChars||[])];if(!sc.includes("granny_npc"))sc.push("granny_npc");n.seenChars=sc;save(n);onMsg({type:"talk",speaker:"老婆",text,joinMsg:justJoin?"縁側のおばあさんが仲間に加わった。":null,cb:()=>{busy.current=false;}});return n;});return;}
    if(a.boss&&!(g.defeatedBosses||[]).includes(a.boss.data.id)){if(Math.abs(a.boss.pos.x-nx)<=1&&Math.abs(a.boss.pos.y-ny)<=1){busy.current=true;const bid=a.boss.data.id;setGs(p=>{const sc=[...(p.seenChars||[])];if(!sc.includes(bid))sc.push(bid);return{...p,pos:{x:nx,y:ny},seenChars:sc};});onBattle({boss:a.boss,cb:()=>{busy.current=false;}});return;}}
    if((a.map[ny][nx]===TALL||a.map[ny][nx]===GRASS)&&Math.random()<0.1){busy.current=true;setGs(p=>({...p,pos:{x:nx,y:ny}}));onBattle({wild:mkWild(g.area),cb:()=>{busy.current=false;}});return;}
    setGs(p=>{const n={...p,pos:{x:nx,y:ny}};if(Math.random()<.08)save(n);return n;});
  },[onBattle,onMsg,setGs,exitSet]);

  useEffect(()=>{const h=e=>{if(e.key==="ArrowUp"||e.key==="w")move(0,-1);if(e.key==="ArrowDown"||e.key==="s")move(0,1);if(e.key==="ArrowLeft"||e.key==="a")move(-1,0);if(e.key==="ArrowRight"||e.key==="d")move(1,0);};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[move]);

  const lead=gs.party[0];
  return(
    <div style={{background:"#050305",maxWidth:400,margin:"0 auto",display:"flex",flexDirection:"column",minHeight:"100vh",position:"relative"}}>
      <FadeOverlay active={fading}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 10px",background:"#0a0505",borderBottom:"1px solid #1a0a0a"}}>
        <span style={{color:"#6a5050",fontSize:11,fontFamily:"serif"}}>{ar.name}</span>
        <button onClick={()=>onMsg({type:"menu"})} style={{background:"none",border:"1px solid #3d2020",color:"#8b6060",fontSize:11,padding:"3px 10px",cursor:"pointer",fontFamily:"serif"}}>メニュー</button>
      </div>
      <canvas ref={ref} width={VIEW_W*TILE} height={VIEW_H*TILE} style={{imageRendering:"pixelated",width:"100%",maxWidth:400}}/>
      <div style={{background:"#070307",padding:"6px 0 4px",borderTop:"1px solid #1a0a0a"}}>
        <div style={{display:"flex",justifyContent:"center",gap:6}}><div style={{width:52}}/><Dbtn label="▲" onClick={()=>move(0,-1)}/><div style={{width:52}}/></div>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:4}}><Dbtn label="◄" onClick={()=>move(-1,0)}/><Dbtn label="●" onClick={()=>{}}/><Dbtn label="►" onClick={()=>move(1,0)}/></div>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:4}}><div style={{width:52}}/><Dbtn label="▼" onClick={()=>move(0,1)}/><div style={{width:52}}/></div>
      </div>
      {lead&&(<div style={{background:"#0a0505",padding:"5px 12px",borderTop:"1px solid #1a0a0a",display:"flex",alignItems:"center",gap:8}}><CreatureCanvas spr={lead.spr} color={lead.color} size={36}/><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#ccbbaa",fontSize:11,fontFamily:"serif"}}>{lead.name} Lv.{lead.level}</span><span style={{color:"#6a5a5a",fontSize:10}}>{lead.hp}/{lead.maxHp}</span></div><HpBar hp={lead.hp} maxHp={lead.maxHp}/><ExpBar exp={lead.exp} lv={lead.level}/></div></div>)}
    </div>
  );
}


function BattleScreen({party,grannyJoined,enemy,isBoss,bossData,onEnd,onDropItem}){
  const [lp,setLp]=useState(()=>JSON.parse(JSON.stringify(party)));
  const [foe,setFoe]=useState(()=>JSON.parse(JSON.stringify(enemy)));
  const [log,setLog]=useState(()=>isBoss?[bossData.intro[0]]:[`野生の${enemy.name}が現れた！`]);
  const [phase,setPhase]=useState(isBoss?"intro":"select");
  const [iIdx,setIIdx]=useState(0);
  const [pend,setPend]=useState({learns:[],evo:null,res:null,party:null});
  const [learnNew,setLearnNew]=useState(null);
  const [swapMode,setSwapMode]=useState(false);
  // 連戦チェーン: chain={id,name,role,intro,outro,data}
  const [chainBoss,setChainBoss]=useState(()=>{
    if(!isBoss||!bossData?.chain)return null;
    if(bossData.chain.id==="sumiko"&&grannyJoined){
      return{...bossData.chain,data:bossData.chain.dataAngry,intro:bossData.chain.introAngry,outro:bossData.chain.outroAngry};
    }
    return bossData.chain;
  });
  const addLog=m=>setLog(p=>[...p.slice(-4),m]);
  const mon=lp[0];

  const nextIntro=()=>{const ni=iIdx+1;if(ni<bossData.intro.length){setIIdx(ni);addLog(bossData.intro[ni]);}else setPhase("select");};

  const doAtk=mv=>{
    if(phase!=="select")return;
    setPhase("busy");
    const dmg=calcDmg(mon.atk,foe.def,mv.power);
    const nfHp=Math.max(0,foe.hp-dmg);
    setFoe(f=>({...f,hp:nfHp}));
    addLog(`${mon.name}の${mv.name}！ ${dmg}ダメージ！`);
    const updLp=lp.map((c,i)=>i===0?{...c,moves:c.moves.map(m=>m.name===mv.name?{...m,pp:Math.max(0,m.pp-1)}:m)}:c);
    setLp(updLp);
    if(nfHp<=0){
      // 連戦チェックがあるか？
      if(chainBoss){
        // 連戦へ
        addLog(bossData.outro?.[0]||`${foe.name}を倒した！`);
        setTimeout(()=>{
          addLog(chainBoss.intro[0]);
          setFoe({...chainBoss.data});
          setChainBoss(null); // チェーン消費
          setPhase("chainIntro");
        },800);
        return;
      }
      const expG=foe.level*60;let learnQ=[],evo=null;
      const fp=updLp.map((c,i)=>{if(i!==0)return c;const r=gainExp(c,expG);r.newMovesToLearn.forEach(m=>{if(!r.creature.moves.find(x=>x.name===m.name))learnQ.push(m);});if(r.evolutions.length>0)evo=r.evolutions[r.evolutions.length-1];addLog(`${r.creature.name}にEXP+${expG}！`);if(r.levelUps.length>0)addLog(`Lv.${r.levelUps[r.levelUps.length-1]}！★PP全回復`);return r.creature;});
      // 野生から養命種ドロップ
      if(!isBoss){if(Math.random()<0.08)setTimeout(()=>onDropItem&&onDropItem("yomei"),400);else if(Math.random()<0.12)setTimeout(()=>onDropItem&&onDropItem("half_meds"),400);}
      setLp(fp);setPend({learns:learnQ,evo,res:"win",party:fp});
      // 技が4未満なら自動追加、4つなら入れ替え選択
      let fpAfterLearn=fp;
      const autoLearn=[];
      const needReplace=[];
      learnQ.forEach(mv=>{
        const curMoves=fpAfterLearn[0].moves;
        if(curMoves.length<4){
          fpAfterLearn=fpAfterLearn.map((c,i)=>i===0?{...c,moves:[...c.moves,{...mv}]}:c);
          autoLearn.push(mv.name);
        } else {
          needReplace.push(mv);
        }
      });
      if(autoLearn.length>0)addLog(`${fpAfterLearn[0].name}が「${autoLearn.join('」「')}」を覚えた！`);
      setLp(fpAfterLearn);setPend({learns:needReplace,evo,res:"win",party:fpAfterLearn});
      if(needReplace.length>0){setLearnNew(needReplace[0]);setPhase("learnReplace");}else if(evo)setPhase("evo");else setPhase("result");
      return;
    }
    setTimeout(()=>{const em=foe.moves[Math.floor(Math.random()*foe.moves.length)]||{name:"かみつく",power:30};
      if(em.power<0){const healAmt=Math.abs(em.power);const newFoeHp=Math.min(foe.maxHp,foe.hp+healAmt);setFoe(f=>({...f,hp:newFoeHp}));addLog(`${foe.name}の${em.name}！ HPが${healAmt}回復した！`);setPhase("select");return;}
      const ed=calcDmg(foe.atk,mon.def,em.power);const nmHp=Math.max(0,mon.hp-ed);addLog(`${foe.name}の${em.name}！ ${ed}ダメージ！`);const fp2=updLp.map((c,i)=>i===0?{...c,hp:nmHp}:c);setLp(fp2);if(nmHp<=0){addLog(`${mon.name}は倒れた…`);const hasNext=fp2.slice(1).some(c=>c.hp>0);if(hasNext){setPhase("forceSwap");}else{setPend({learns:[],evo:null,res:"lose",party:fp2});setPhase("result");}}else setPhase("select");},600);
  };

  const doSwap=idx=>{if(idx===0||lp[idx].hp<=0)return;const nl=[...lp];[nl[0],nl[idx]]=[nl[idx],nl[0]];setLp(nl);addLog(`${nl[0].name}と交代！`);setSwapMode(false);setPhase("select");};

  // 連戦イントロ
  const [chainIdx,setChainIdx]=useState(0);
  if(phase==="chainIntro"){
    const chainIntroLines=bossData?.chain?.intro||[];
    const isAngry=grannyJoined&&bossData?.chain?.id==="sumiko";
    const lines=isAngry?(bossData?.chain?.introAngry||chainIntroLines):chainIntroLines;
    const currentLine=lines[chainIdx]||"";
    const isLast=chainIdx>=lines.length-1;
    const bgColor=isAngry?"#080004":"#050305";
    const borderColor=isAngry?"#5a0020":"#1a0a1a";
    return(<div style={{background:bgColor,maxWidth:400,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"serif"}}>
      {isAngry&&<div style={{background:"#3a0010",padding:"6px 12px",textAlign:"center",borderBottom:`1px solid ${borderColor}`}}><span style={{color:"#ff6080",fontSize:11,letterSpacing:2}}>── 激怒 ──</span></div>}
      <div style={{background:"#0a0508",padding:10,borderBottom:`1px solid ${borderColor}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div><div style={{color:isAngry?"#ffaaaa":"#ccbbaa",fontSize:13}}>{foe.name}</div><div style={{color:"#6a4040",fontSize:10}}>{bossData.chain?.role}</div><div style={{color:"#6a5050",fontSize:10}}>Lv.{foe.level}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:"#8b6060",fontSize:10,marginBottom:3}}>HP {foe.hp}/{foe.maxHp}</div><HpBar hp={foe.hp} maxHp={foe.maxHp} w={100}/></div>
        </div>
        <div style={{display:"flex",justifyContent:"center",height:88,alignItems:"center"}}><CreatureCanvas spr={foe.spr||"granny"} color={foe.color||"#8b0000"} size={88} scale={3}/></div>
      </div>
      <div style={{background:isAngry?"#100008":"#080308",padding:"12px 16px",flex:1,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
        <div>
          {lines.slice(0,chainIdx+1).map((l,i)=>(<div key={i} style={{color:i===chainIdx?(isAngry?"#ffcccc":"#ccbbaa"):"#4a3a4a",fontSize:i===chainIdx?13:10,marginBottom:6,lineHeight:1.7,fontStyle:i===chainIdx?"normal":"italic"}}>「{l}」</div>))}
        </div>
        <button onClick={()=>{if(isLast){setPhase("select");}else{setChainIdx(ci=>ci+1);}}} style={{...BS(isAngry?"#3a0010":"#1a0808",isAngry?"#cc0030":"#8b0000"),fontSize:12,padding:"8px 16px",marginTop:12}}>
          {isLast?"▶ 戦う":"▶ 次へ"}
        </button>
      </div>
    </div>);
  }

  if(phase==="learnReplace"&&learnNew){
    const curMon=pend.party?pend.party[0]:lp[0];
    const advance=()=>{const rest=pend.learns.slice(1);if(rest.length>0){setLearnNew(rest[0]);setPend(p=>({...p,learns:rest}));}else if(pend.evo)setPhase("evo");else setPhase("result");};
    return(<div style={{background:"#050305",maxWidth:400,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"serif",padding:16}}><div style={{color:"#4a3030",fontSize:11,textAlign:"center",marginBottom:12,letterSpacing:3}}>── 新しい技を覚えた ──</div><div style={{background:"#0a1020",border:"1px solid #2a3060",padding:12,marginBottom:14,textAlign:"center"}}><div style={{color:"#aaaaff",fontSize:16,marginBottom:4}}>「{learnNew.name}」</div><div style={{color:"#6a6a9a",fontSize:10}}>{learnNew.type}タイプ / 威力{learnNew.power} / PP{learnNew.pp}</div></div><div style={{color:"#8b6060",fontSize:11,marginBottom:10}}>どの技と入れ替えますか？（最大4つ）</div>{curMon.moves.map((mv,i)=>(<button key={i} onClick={()=>{const nm=curMon.moves.map((m,j)=>j===i?{...learnNew}:m);const fp=(pend.party||lp).map((c,ci)=>ci===0?{...c,moves:nm}:c);setLp(fp);setPend(p=>({...p,party:fp}));advance();}} style={{...BS("#0d0a0a","#5a3030"),textAlign:"left",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#ccbbaa",fontSize:12}}>{mv.name}</span><span style={{color:"#6a5050",fontSize:10}}>{mv.type} 威力{mv.power}</span></button>))}<button onClick={advance} style={BS("#0a0808","#3d2020",{width:"100%",marginTop:4,textAlign:"center"})}>覚えない</button></div>);
  }
  if(phase==="evo"&&pend.evo){
    return(<div style={{background:"#050305",maxWidth:400,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"serif",padding:30}}><div style={{color:"#8b0000",fontSize:11,marginBottom:20,letterSpacing:3}}>── 進 化 ──</div><div style={{color:"#8b6060",fontSize:14,marginBottom:8}}>{pend.evo.from}</div><div style={{color:"#ccbbaa",fontSize:11,marginBottom:8}}>▼</div><div style={{color:"#ffcc00",fontSize:22,marginBottom:24}}>{pend.evo.to}</div><button onClick={()=>setPhase("result")} style={BS("#1a0808","#cc3300",{marginTop:8})}>…！</button></div>);
  }
  if(phase==="forceSwap"){
    const forceSwap=idx=>{if(lp[idx].hp<=0)return;const nl=[...lp];[nl[0],nl[idx]]=[nl[idx],nl[0]];setLp(nl);addLog(`${nl[0].name}、行け！`);setPhase("select");};
    return(<div style={{background:"#050305",maxWidth:400,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"serif",padding:14}}><div style={{color:"#cc4444",fontSize:11,textAlign:"center",marginBottom:6,letterSpacing:2}}>── 次の仲間を選べ ──</div><div style={{color:"#6a4040",fontSize:10,textAlign:"center",marginBottom:14}}>戦える仲間を選んでください</div>{lp.map((c,i)=>{if(i===0)return null;return(<div key={i} onClick={()=>c.hp>0&&forceSwap(i)} style={{background:c.hp<=0?"#080808":"#0a0508",border:`1px solid ${c.hp<=0?"#1a0a0a":"#3d1a2d"}`,padding:12,marginBottom:8,display:"flex",gap:10,alignItems:"center",cursor:c.hp>0?"pointer":"default",opacity:c.hp<=0?0.3:1}}><CreatureCanvas spr={c.spr} color={c.color} size={44}/><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:c.hp<=0?"#5a4040":"#ccbbaa",fontSize:13}}>{c.name}</span><span style={{color:"#6a5050",fontSize:10}}>Lv.{c.level}</span></div><div style={{color:"#6a5050",fontSize:10,margin:"2px 0"}}>{c.types?.join("・")}</div><HpBar hp={c.hp} maxHp={c.maxHp}/><span style={{color:c.hp<=0?"#aa4444":"#6a5050",fontSize:10}}>{c.hp<=0?"戦えない":c.hp+"/"+c.maxHp}</span></div></div>);})}</div>);
  }
  if(swapMode){
    return(<div style={{background:"#050305",maxWidth:400,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"serif",padding:14}}><div style={{color:"#8b6060",fontSize:11,textAlign:"center",marginBottom:12}}>── 誰と交代する？ ──</div>{lp.map((c,i)=>(<div key={i} onClick={()=>i>0&&c.hp>0&&doSwap(i)} style={{background:i===0?"#0d0808":c.hp<=0?"#080808":"#0a0508",border:`1px solid ${i===0?"#5a2020":c.hp<=0?"#1a0a0a":"#2d1a2d"}`,padding:10,marginBottom:8,display:"flex",gap:8,alignItems:"center",cursor:i>0&&c.hp>0?"pointer":"default",opacity:c.hp<=0?0.4:1}}><CreatureCanvas spr={c.spr} color={c.color} size={36}/><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:i===0?"#8b6060":"#ccbbaa",fontSize:12}}>{c.name}{i===0?" ← 戦闘中":""}</span><span style={{color:"#6a5050",fontSize:10}}>Lv.{c.level}</span></div><HpBar hp={c.hp} maxHp={c.maxHp}/><span style={{color:"#6a5050",fontSize:10}}>{c.hp}/{c.maxHp}</span></div></div>))}<button onClick={()=>setSwapMode(false)} style={BS("#0a0508","#3d2020",{width:"100%",marginTop:4})}>キャンセル</button></div>);
  }

  return(
    <div style={{background:"#050305",maxWidth:400,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"serif"}}>
      <div style={{background:"#0a0508",padding:10,borderBottom:"1px solid #1a0a1a"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div><div style={{color:"#ccbbaa",fontSize:13}}>{foe.name}</div>{isBoss&&<div style={{color:"#6a4040",fontSize:10}}>{bossData.role}</div>}<div style={{color:"#6a5050",fontSize:10}}>Lv.{foe.level} {foe.types?.join("・")}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:"#8b6060",fontSize:10,marginBottom:3}}>HP {foe.hp}/{foe.maxHp}</div><HpBar hp={foe.hp} maxHp={foe.maxHp} w={100}/></div>
        </div>
        <div style={{display:"flex",justifyContent:"center",height:88,alignItems:"center"}}><CreatureCanvas spr={foe.spr||foe.spriteKey} color={foe.color} size={88} scale={foe.spr&&SPRITES[foe.spr]?.w<=12?6:3}/></div>
      </div>
      <div style={{background:"#080308",padding:"6px 12px",minHeight:58,borderBottom:"1px solid #1a0a1a"}}>
        {log.slice(-3).map((l,i)=>(<div key={i} style={{color:i===log.slice(-3).length-1?"#ccbbaa":"#5a4a4a",fontSize:11,marginBottom:2,lineHeight:1.5}}>{l}</div>))}
        {phase==="intro"&&<button onClick={nextIntro} style={{...BS("#1a0808","#8b0000"),fontSize:11,padding:"3px 10px",marginTop:3}}>▶ 次へ</button>}
        {phase==="result"&&(<OutroResult pend={pend} isBoss={isBoss} bossData={bossData} onEnd={()=>onEnd({result:pend.res,party:pend.party||lp})}/>)}
      </div>
      {mon&&(<div style={{background:"#080308",padding:"5px 10px",borderBottom:"1px solid #1a0a1a",display:"flex",alignItems:"center",gap:8}}><CreatureCanvas spr={mon.spr} color={mon.color} size={38}/><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#ccbbaa",fontSize:12}}>{mon.name}</span><span style={{color:"#6a5a5a",fontSize:10}}>Lv.{mon.level}</span></div><div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}><HpBar hp={mon.hp} maxHp={mon.maxHp}/><span style={{color:"#6a5a5a",fontSize:10,whiteSpace:"nowrap"}}>{mon.hp}/{mon.maxHp}</span></div><ExpBar exp={mon.exp} lv={mon.level}/></div></div>)}
      {phase==="select"&&mon&&(
        <div style={{padding:8,flex:1,display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {mon.moves.map((mv,i)=>(<button key={i} onClick={()=>doAtk(mv)} style={{...BS("#0d0a0a","#5a3030"),textAlign:"left",padding:"7px 9px",opacity:mv.pp===0?.3:1,pointerEvents:mv.pp===0?"none":"auto"}}><div style={{color:"#ccbbaa",fontSize:11}}>{mv.name}</div><div style={{color:"#6a5050",fontSize:9,marginTop:1}}>{mv.type} 威力{mv.power} <span style={{color:mv.pp<=mv.maxPp*0.3?"#aa4444":"#5a6a5a"}}>PP{mv.pp}/{mv.maxPp}</span></div></button>))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:2}}>
            <button onClick={()=>lp.length>1?setSwapMode(true):addLog("仲間がいない。")} style={BS("#0a0a1a","#4a4a8a",{fontSize:10,padding:"8px 4px",textAlign:"center"})}>交代</button>
            <button onClick={()=>{
              if(foe.hp>=foe.maxHp){addLog("元気すぎて相手にされない。");return;}
              // chainBossがまだ残っている間はゲット不可（すでにchainBossはnullなら連戦済み）
              if(isBoss&&chainBoss!==null&&chainBoss!==undefined){addLog("まだ終わっていない。");return;}
              const r=(foe.maxHp-foe.hp)/foe.maxHp;
              if(Math.random()<r*.7+.1){const ct={...foe,hp:foe.maxHp};addLog(`${foe.name}を仲間にした！`);setTimeout(()=>onEnd({result:"caught",party:lp,caught:ct}),700);}
              else addLog(`${foe.name}には断られた。`);
            }} style={BS("#0a0d0a","#2a6a2a",{fontSize:10,padding:"8px 4px",textAlign:"center"})}>つかまえる</button>
            <button onClick={()=>{if(isBoss){addLog("逃げられない…！");return;}onEnd({result:"flee",party:lp});}} style={BS("#0d0a0a","#6a2a2a",{fontSize:10,padding:"8px 4px",textAlign:"center"})}>にげる</button>
          </div>
        </div>
      )}
    </div>
  );
}

function OutroResult({pend,isBoss,bossData,onEnd}){
  const lines=isBoss&&pend.res==="win"?(bossData.outro||[]):[];
  const [idx,setIdx]=useState(0);
  const isLast=idx>=lines.length-1;
  if(lines.length===0)return(<button onClick={onEnd} style={{...BS("#0a0818","#4466cc"),fontSize:11,padding:"4px 12px",marginTop:5}}>{pend.res==="win"?"続ける":"戻る"}</button>);
  return(<div>
    <div style={{color:"#ccbbaa",fontSize:11,marginTop:4,lineHeight:1.7}}>「{lines[idx]}」</div>
    <button onClick={()=>{if(isLast)onEnd();else setIdx(i=>i+1);}} style={{...BS("#0a0818","#4466cc"),fontSize:11,padding:"4px 12px",marginTop:6}}>{isLast?"続ける":"▶ 次へ"}</button>
  </div>);
}

function MenuScreen({gs,setGs,onClose}){
  const [tab,setTab]=useState("party");
  const [dexTab,setDexTab]=useState("creature");
  const [msg,setMsg]=useState(null);
  const [swapping,setSwapping]=useState(false);
  const [swapFrom,setSwapFrom]=useState(null);
  const {party=[],inventory=[],memoryItems=[],caught=[],seenChars=[]}=gs;

  const useItm=(it,idx)=>{
    const res=useItemOn(it,party);
    setGs(p=>{
      const ni=[...p.inventory];
      ni.splice(idx,1);
      const n={...p,party:res.party,inventory:ni};
      save(n);return n;
    });
    setMsg(res.msg);
  };
  const startSwap=i=>{setSwapping(true);setSwapFrom(i);};
  const doSwap=i=>{if(swapFrom===null||i===swapFrom){setSwapping(false);setSwapFrom(null);return;}setGs(p=>{const np=[...p.party];[np[swapFrom],np[i]]=[np[i],np[swapFrom]];const n={...p,party:np};save(n);return n;});setSwapping(false);setSwapFrom(null);};

  const TABS=[{k:"party",l:"パーティ"},{k:"item",l:"アイテム"},{k:"dex",l:"図鑑"}];
  const DEX=[{k:"creature",l:"生き物"},{k:"memory",l:"記憶"},{k:"char",l:"人物"}];
  return(
    <div style={{position:"fixed",inset:0,background:"#050305",zIndex:300,maxWidth:400,margin:"0 auto",display:"flex",flexDirection:"column",fontFamily:"serif"}}>
      <div style={{display:"flex",borderBottom:"1px solid #1a0a1a",background:"#0a0508"}}>
        {TABS.map(({k,l})=>(<button key={k} onClick={()=>setTab(k)} style={{flex:1,background:tab===k?"#1a0808":"none",border:"none",borderBottom:tab===k?"2px solid #8b0000":"none",color:tab===k?"#ccbbaa":"#6a5050",padding:"10px 0",cursor:"pointer",fontSize:12,fontFamily:"serif"}}>{l}</button>))}
      </div>
      {msg&&<div style={{background:"#1a0a08",padding:"6px 12px",borderBottom:"1px solid #3a1a1a",display:"flex",justifyContent:"space-between"}}><span style={{color:"#ccbbaa",fontSize:12}}>{msg}</span><button onClick={()=>setMsg(null)} style={{background:"none",border:"none",color:"#8b6060",cursor:"pointer"}}>×</button></div>}
      {swapping&&tab==="party"&&<div style={{background:"#0a1808",padding:"6px 12px",borderBottom:"1px solid #1a3a1a"}}><span style={{color:"#88aa88",fontSize:11}}>入れ替え先を選んでください</span><button onClick={()=>{setSwapping(false);setSwapFrom(null);}} style={{float:"right",background:"none",border:"none",color:"#8b6060",cursor:"pointer",fontSize:11}}>×</button></div>}
      <div style={{flex:1,overflow:"auto",padding:10}}>
        {tab==="party"&&party.map((c,i)=>{
          const evo=ID2EVO[c.id];const chain=evo?EVO[evo.chain]:null;const next=chain&&evo?chain[evo.idx+1]:null;const isFrom=swapFrom===i;
          return(<div key={i} style={{background:isFrom?"#1a1a08":"#0a0508",border:`1px solid ${isFrom?"#8b8b00":"#2d1a2d"}`,padding:10,marginBottom:8,display:"flex",gap:8,alignItems:"flex-start"}}><CreatureCanvas spr={c.spr} color={c.color} size={44}/><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#ccbbaa",fontSize:13}}>{c.name}</span><span style={{color:"#6a5050",fontSize:10}}>Lv.{c.level}</span></div><div style={{color:"#6a5050",fontSize:10,margin:"1px 0"}}>{c.types?.join("・")}</div><div style={{display:"flex",gap:8,fontSize:10,color:"#5a4a4a",margin:"2px 0"}}><span>HP {c.hp}/{c.maxHp}</span><span>攻{c.atk}</span><span>防{c.def}</span><span>速{c.spd}</span></div><HpBar hp={c.hp} maxHp={c.maxHp}/><ExpBar exp={c.exp} lv={c.level}/><div style={{color:"#334488",fontSize:9,marginTop:1}}>EXP {c.exp||0}/{c.level<MAX_LEVEL?expNeeded(c.level+1):"MAX"}</div>{next&&<div style={{color:"#4a3a2a",fontSize:9,marginTop:2}}>Lv.{evo.evoAt}で「{next.name}」に変化</div>}<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>{(c.moves||[]).map((mv,j)=>(<span key={j} style={{background:"#1a0a18",border:"1px solid #3a1a3a",color:"#aa88aa",fontSize:9,padding:"1px 4px"}}>{mv.name} <span style={{color:mv.pp<=mv.maxPp*0.3?"#aa4444":"#6a6a8a"}}>{mv.pp}/{mv.maxPp}</span></span>))}</div><div style={{marginTop:6}}>{!swapping&&<button onClick={()=>startSwap(i)} style={BS("#0a0a1a","#3a3a6a",{fontSize:10,padding:"4px 10px"})}>入れ替え</button>}{swapping&&swapFrom!==i&&<button onClick={()=>doSwap(i)} style={BS("#0a1a0a","#2a6a2a",{fontSize:10,padding:"4px 10px"})}>ここと交代</button>}</div></div></div>);
        })}
        {tab==="item"&&(inventory.length>0?inventory.map((it,i)=>(<div key={i} style={{background:"#0a0508",border:"1px solid #2d1a2d",padding:10,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}><div style={{flex:1}}><div style={{color:it.type==="pp"?"#88aaff":"#ffcc00",fontSize:12}}>✦ {it.name}</div><div style={{color:"#8b6060",fontSize:10,marginTop:3,lineHeight:1.5}}>{it.desc?.replace(/ppRestore:\d+/,"")}</div>{it.hp>0&&<div style={{color:"#4a8a4a",fontSize:10,marginTop:2}}>HP +{it.hp}</div>}{it.type==="pp"&&<div style={{color:"#4a6aaa",fontSize:10,marginTop:2}}>PP回復（{it.name.includes("大")?"全回復":"PP+15"}）</div>}</div><button onClick={()=>useItm(it,i)} style={BS("#0a1a0a","#2a6a2a",{fontSize:11,padding:"6px 10px",flexShrink:0})}>使う</button></div>)):<div style={{color:"#4a3030",fontSize:12,textAlign:"center",marginTop:40}}>アイテムはない。</div>)}
        {tab==="dex"&&(<>
          <div style={{display:"flex",borderBottom:"1px solid #1a0a1a",marginBottom:10}}>{DEX.map(({k,l})=>(<button key={k} onClick={()=>setDexTab(k)} style={{flex:1,background:dexTab===k?"#0d0508":"none",border:"none",borderBottom:dexTab===k?"1px solid #6a3040":"none",color:dexTab===k?"#ccbbaa":"#5a4050",padding:"7px 0",cursor:"pointer",fontSize:11,fontFamily:"serif"}}>{l}</button>))}</div>
          {dexTab==="creature"&&(<>
            <div style={{color:"#4a3040",fontSize:10,letterSpacing:2,marginBottom:8,borderBottom:"1px solid #1a0a1a",paddingBottom:6}}>── 出会った生き物 ──</div>
            {STARTERS.map((s,si)=>{
              const chain=EVO[s.id]||[];
              // partyの中からこのスターターの系統を探す
              const partyC=(gs.party||[]).find(c=>{
                try{return baseIdOf(c.id)===s.id;}catch(e){return false;}
              });
              const caughtC=(caught||[]).find(c=>{
                try{return baseIdOf(c.id)===s.id;}catch(e){return false;}
              });
              const currentForm=partyC||caughtC||null;
              const currentEvoIdx=currentForm?(ID2EVO[currentForm.id]?.idx??0):0;
              return(<div key={si} style={{background:"#0a0810",border:"1px solid #1a1a3d",padding:10,marginBottom:10}}>
                {/* 進化チェーン横並び */}
                <div style={{display:"flex",gap:4,marginBottom:8,justifyContent:"space-around",flexWrap:"nowrap"}}>
                  {chain.map((stage,ei)=>{
                    const isNow=currentForm&&(ID2EVO[currentForm.id]?.idx??0)===ei;
                    const isUnlocked=currentForm&&currentEvoIdx>=ei;
                    return(<div key={ei} style={{textAlign:"center",flex:1,opacity:isUnlocked?1:0.3}}>
                      <CreatureCanvas spr={stage.spr} color={s.color} size={32}/>
                      <div style={{color:isNow?"#ffdd44":"#7a7a9a",fontSize:7,marginTop:1,lineHeight:1.2,wordBreak:"break-all"}}>{isUnlocked?stage.name:"？？？"}</div>
                      {ei<chain.length-1&&stage.evoAt&&<div style={{color:"#4a4a6a",fontSize:7}}>↓Lv{stage.evoAt}</div>}
                    </div>);
                  })}
                </div>
                {/* 現在の姿と説明 */}
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <CreatureCanvas spr={currentForm?.spr||s.spr} color={s.color} size={40}/>
                  <div style={{flex:1}}>
                    <div style={{color:"#ccbbaa",fontSize:12}}>{currentForm?.name||s.name}</div>
                    <div style={{color:"#6a5050",fontSize:10}}>{(s.types||[]).join("・")}</div>
                    {currentForm?.level&&<div style={{color:"#4a5a4a",fontSize:10}}>Lv.{currentForm.level}</div>}
                  </div>
                  {partyC&&<span style={{color:"#4a8a4a",fontSize:9,border:"1px solid #2a5a2a",padding:"1px 4px"}}>仲間</span>}
                  {caughtC&&!partyC&&<span style={{color:"#4a4a8a",fontSize:9,border:"1px solid #2a2a5a",padding:"1px 4px"}}>図鑑</span>}
                </div>
                <div style={{color:"#8888aa",fontSize:10,lineHeight:1.7,fontStyle:"italic"}}>「{s.desc}」</div>
              </div>);
            })}
            {(caught||[]).filter(c=>{try{return!STARTERS.some(s=>baseIdOf(c.id)===s.id);}catch(e){return true;}}).length>0&&<>
              <div style={{color:"#4a3040",fontSize:10,letterSpacing:2,marginBottom:8,marginTop:4,borderBottom:"1px solid #1a0a1a",paddingBottom:6}}>── その他 ──</div>
              {(caught||[]).filter(c=>{try{return!STARTERS.some(s=>baseIdOf(c.id)===s.id);}catch(e){return true;}}).map((c,i)=>(<div key={i} style={{background:"#0a0508",border:"1px solid #2d1a2d",padding:10,marginBottom:8,display:"flex",gap:8,alignItems:"center"}}><CreatureCanvas spr={c.spr} color={c.color||"#5a5a5a"} size={40}/><div><div style={{color:"#ccbbaa",fontSize:13}}>{c.name}</div><div style={{color:"#6a5050",fontSize:10,marginTop:1}}>{(c.types||[]).join("・")} / Lv.{c.level}</div></div></div>))}
            </>}
          </>)}
          {dexTab==="memory"&&(memoryItems.length>0?memoryItems.map((it,i)=>(<div key={i} style={{background:"#0a0810",border:"1px solid #1a1a3d",padding:12,marginBottom:8}}><div style={{color:"#8888cc",fontSize:11,marginBottom:6}}>◈ {it.name}</div><div style={{color:"#9a9aaa",fontSize:11,lineHeight:1.7,fontStyle:"italic"}}>{it.desc}</div></div>)):<div style={{color:"#4a3030",fontSize:12,textAlign:"center",marginTop:40}}>記憶はない。</div>)}
          {dexTab==="char"&&(seenChars.length>0?seenChars.map((cid,i)=>{const p=CHAR_PROFILES[cid];if(!p)return null;const lines=p.desc.split("\n");return(<div key={i} style={{background:"#0a0508",border:"1px solid #2d1a2d",padding:12,marginBottom:10}}><div style={{display:"flex",gap:10,alignItems:"flex-start"}}><CreatureCanvas spr={p.spr} color="#5a3a5a" size={48}/><div style={{flex:1}}><div style={{color:"#ccbbaa",fontSize:13}}>{p.name}</div><div style={{color:"#8b6060",fontSize:10,marginTop:1}}>{p.role}</div></div></div><div style={{marginTop:10,borderTop:"1px solid #1a0a1a",paddingTop:8}}>{lines.map((l,li)=>(<div key={li} style={{color:"#9a8a9a",fontSize:11,lineHeight:1.8,marginBottom:l===""?4:0}}>{l===""?" ":l}</div>))}</div></div>);}):<div style={{color:"#4a3030",fontSize:12,textAlign:"center",marginTop:40}}>まだ誰とも会っていない。</div>)}
        </>)}
      </div>
      <div style={{padding:"8px 12px",borderTop:"1px solid #1a0a1a"}}><button onClick={onClose} style={BS("#0a0508","#3d2020",{width:"100%"})}>閉じる</button></div>
    </div>
  );
}

function MsgOverlay({msg,onClose}){
  if(!msg)return null;
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.72)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 80px"}}><div style={{background:"#0a0505",border:"1px solid #3d2020",padding:16,maxWidth:380,width:"calc(100% - 20px)",fontFamily:"serif"}}>{msg.type==="item"&&(<><div style={{color:msg.item.type==="pp"?"#88aaff":"#ffcc00",fontSize:11,marginBottom:6}}>✦ {msg.item.name}</div><div style={{color:"#ccbbaa",fontSize:12,lineHeight:1.6}}>{msg.item.desc?.replace(/ppRestore:\d+/,"")}</div>{msg.item.type==="heal"&&<div style={{color:"#4a8a4a",fontSize:11,marginTop:6}}>→ アイテム袋に入れた（HP+{msg.item.hp}）</div>}{msg.item.type==="pp"&&<div style={{color:"#4a6aaa",fontSize:11,marginTop:6}}>→ アイテム袋に入れた</div>}{msg.item.type==="memory"&&<div style={{color:"#5a6aaa",fontSize:11,marginTop:6}}>→ 図鑑「記憶」に追加した</div>}</>)}{msg.type==="talk"&&(<><div style={{color:"#8b6060",fontSize:10,marginBottom:4}}>{msg.speaker}</div><div style={{color:"#ccbbaa",fontSize:12,lineHeight:1.7}}>「{msg.text}」</div>{msg.joinMsg&&<div style={{color:"#4a8aaa",fontSize:11,marginTop:10}}>★ {msg.joinMsg}</div>}</>)}{msg.type==="drop"&&(<><div style={{color:"#aaddaa",fontSize:11,marginBottom:6}}>✦ {msg.dropKey==="half_meds"?"飲みかけの薬":"養命種"}を拾った</div><div style={{color:"#88cc88",fontSize:12,lineHeight:1.6}}>野生の生き物が落としていった。アイテム袋に入れた。</div></>)}{msg.type==="outro"&&<div style={{color:"#ccbbaa",fontSize:12,lineHeight:1.7}}>「{msg.text}」</div>}<button onClick={()=>{msg.cb&&msg.cb();onClose();}} style={{background:"none",border:"1px solid #3d2020",color:"#8b6060",fontSize:11,padding:"4px 16px",cursor:"pointer",fontFamily:"serif",marginTop:12,width:"100%"}}>続ける ▶</button></div></div>);
}

function EndingScreen({type}){
  const isB=type==="B";
  const lines=isB?[
    "── 夜の川沿い ──",
    "暗い。水の音がする。",
    "隣に誰かがいた。",
    "「どこへ行くの」",
    "「わからん。でも帰らない」",
    "川はずっと流れていた。",
    "…久保田さんは見つからなかった。",
    "── END B「逃走」──"
  ]:[
    "── 病院のベッド ──",
    "白い天井。",
    "家族の声がした。",
    "顔は分からなかった。",
    "でも、手だけ握り返した。",
    "澄子の手だと、分かった気がした。",
    "久保田さんは翌月、静かに息を引き取った。",
    "家族全員に看取られた。",
    "── END A「帰還」──"
  ];
  const ref=useRef(null);const t=useRef(0);const [idx,setIdx]=useState(0);
  useEffect(()=>{const id=setInterval(()=>{t.current++;const c=ref.current;if(!c)return;const ctx=c.getContext("2d");ctx.imageSmoothingEnabled=false;ctx.fillStyle="#020104";ctx.fillRect(0,0,400,200);for(let i=0;i<40;i++){const sx=(i*113+t.current*.2)%380+10,sy=(i*67+t.current*.1)%180+10,b=Math.sin(t.current*.04+i)*.5+.5;ctx.fillStyle=`rgba(${isB?"100,140,200":"180,140,100"},${b*.5})`;ctx.fillRect(sx,sy,1,1);}},60);return()=>clearInterval(id);},[isB]);
  return(
    <div style={{background:"#020104",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"serif"}}>
      <canvas ref={ref} width={400} height={200} style={{imageRendering:"pixelated",width:"100%",maxWidth:400}}/>
      <div style={{padding:"20px 30px",maxWidth:400,width:"100%",flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        {lines.slice(0,idx+1).map((l,i)=>(
          <div key={i} style={{color:l.startsWith("──")?(isB?"#7090c0":"#c09060"):i===idx?"#ccbbaa":"#6a5a5a",fontSize:l.startsWith("──")?12:14,letterSpacing:l.startsWith("──")?3:1,textAlign:"center",marginBottom:14,lineHeight:1.8}}>{l}</div>
        ))}
        <div style={{marginTop:24,textAlign:"center"}}>
          {idx<lines.length-1
            ?<button onClick={()=>setIdx(i=>i+1)} style={BS("#0a0508","#4a3040",{padding:"8px 30px"})}>▶ 次へ</button>
            :<button onClick={()=>window.location.reload()} style={BS(isB?"#000818":"#180800",isB?"#4466aa":"#aa6600",{padding:"8px 30px"})}>もう一度</button>}
        </div>
      </div>
    </div>
  );
}

export default function App(){
  const saved=load();
  const [screen,setScreen]=useState("title");
  const [gs,setGs]=useState(saved?{...INIT_GS,...saved}:INIT_GS);
  const [btl,setBtl]=useState(null);
  const [msgO,setMsgO]=useState(null);
  const [menu,setMenu]=useState(false);
  const [ending,setEnding]=useState(null);
  const btlCb=useRef(null);

  const onBattle=useCallback(({boss,wild,cb})=>{btlCb.current=cb;setBtl(boss?{type:"boss",boss}:{type:"wild",wild});setScreen("battle");},[]);
  const onMsg=useCallback(m=>{if(m.type==="menu"){setMenu(true);return;}setMsgO(m);},[]);

  // 野生から養命種ドロップ
  const onDropItem=useCallback((key)=>{
    const itDef=ITEMS[key];if(!itDef)return;
    setGs(p=>{const n={...p,inventory:[...(p.inventory||[]),{...itDef,_uid:`drop_${Date.now()}`}]};save(n);return n;});
    setMsgO({type:"drop",dropKey:key,cb:()=>{}});
  },[]);

  const onBtlEnd=useCallback(({result,party,caught})=>{
    setScreen("map");
    setGs(p=>{
      let n={...p,party:party||p.party};
      if(result==="win"&&btl?.type==="boss"){
        const bid=btl.boss.data.id;
        n.defeatedBosses=[...(n.defeatedBosses||[]),bid];
        // 連戦ボスの最終IDも登録
        if(btl.boss.chain)n.defeatedBosses=[...n.defeatedBosses,btl.boss.chain.data.id];
        if(bid==="masao"){
          setTimeout(()=>setEnding(n.grannyJoined?"B":"A"),1200);
        } else {
          setTimeout(()=>setMsgO({type:"outro",text:btl.boss.outro[btl.boss.outro.length-1],cb:()=>{}}),200);
        }
      }
      if(result==="caught"&&caught){
        n.caught=[...(n.caught||[]),caught];
        if(n.party.length<MAX_PARTY)n.party=[...n.party,{...caught,hp:caught.maxHp}];
        // ボスを仲間にした場合もマップから消す
        if(btl?.type==="boss"){
          const bid=btl.boss.data.id;
          if(!(n.defeatedBosses||[]).includes(bid))n.defeatedBosses=[...(n.defeatedBosses||[]),bid];
        }
      }
      save(n);return n;
    });
    setBtl(null);setTimeout(()=>{if(btlCb.current){btlCb.current();btlCb.current=null;}},150);
  },[btl]);

  // MapScreenからアイテム拾いコールバック（移動含む）
  const onPickItem=useCallback((itDef,fi)=>{
    setGs(p=>{
      const n={...p,pickedItems:[...(p.pickedItems||[]),fi.id]};
      if(itDef.type==="heal"||itDef.type==="pp")n.inventory=[...(p.inventory||[]),{...itDef,_uid:fi.id}];
      if(itDef.type==="memory")n.memoryItems=[...(p.memoryItems||[]),{...itDef,_uid:fi.id}];
      save(n);return n;
    });
    setMsgO({type:"item",item:itDef,cb:()=>{}});
  },[]);

  if(ending)return <EndingScreen type={ending}/>;
  if(screen==="title")return <TitleScreen hasSave={!!saved} onNew={()=>setScreen("howto")} onContinue={()=>{setGs({...INIT_GS,...saved});setScreen("map");}}/>;
  if(screen==="howto")return <HowToScreen onStart={()=>setScreen("select")}/>;
  if(screen==="select")return <SelectScreen onSelect={s=>{const n={...INIT_GS,party:[{...s}]};setGs(n);save(n);setScreen("narration");}}/>;
  if(screen==="narration")return(<div onClick={()=>setScreen("map")} style={{background:"#020102",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:30,cursor:"pointer"}}><div style={{fontFamily:"serif",textAlign:"center",lineHeight:2.4}}><div style={{color:"#4a3030",fontSize:12,letterSpacing:3,marginBottom:28}}>── 目が覚めた ──</div>{["ここは…どこだ。","暗い。冷たい。","帰らなければ。","…どこへ？"].map((t,i)=>(<div key={i} style={{color:`rgba(180,150,130,${.35+i*.18})`,fontSize:14,marginBottom:10}}>{t}</div>))}<div style={{color:"#2a1a1a",fontSize:11,marginTop:36}}>（タップして始める）</div></div></div>);
  if(screen==="battle"&&btl){
    const enemy=btl.type==="boss"?btl.boss.data:btl.wild;
    return <BattleScreen party={gs.party} grannyJoined={gs.grannyJoined} enemy={enemy} isBoss={btl.type==="boss"} bossData={btl.type==="boss"?btl.boss:null} onEnd={onBtlEnd} onDropItem={onDropItem}/>;
  }
  return(<div style={{maxWidth:400,margin:"0 auto",position:"relative"}}><MapScreen gs={gs} setGs={setGs} onBattle={onBattle} onMsg={onMsg}/><MsgOverlay msg={msgO} onClose={()=>setMsgO(null)}/>{menu&&<MenuScreen gs={gs} setGs={setGs} onClose={()=>setMenu(false)}/>}</div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
